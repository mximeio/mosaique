<style>
  :root{
    --color-primary:#4f46e5; --color-primary-dark:#4338ca;
    --color-accent2:#ef4444;
    --color-bg:#fafafa; --color-surface:#ffffff; --color-surface-alt:#fafbff;
    --color-text:#26241f; --color-text-light:#5f5a51; --color-text-secondary:#5f5a51; --color-text-mute:#8a8378; --color-text-soft:#b3ada2;
    --color-border:#e7e4de; --color-border-light:#f0eee9;
    --nuit:#2D2D3E; --jour:#0ea5e9; --ferie:#4f46e5;
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
    --radius-sm:6px; --radius-md:10px; --radius-lg:14px;
    --shadow-card:0 1px 3px rgba(15,23,42,.05),0 1px 2px rgba(15,23,42,.03);
    --shadow-md:0 4px 12px rgba(15,23,42,.06),0 2px 4px rgba(15,23,42,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{font-family:var(--font);font-size:15px;color:var(--color-text);background:var(--color-bg);-webkit-font-smoothing:antialiased;line-height:1.5;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  .container{max-width:1680px;margin:0 auto;padding:20px 40px 64px}
  .shell-bar{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .space-name{font-size:18px;font-weight:700;color:var(--color-text)}
  .mod-nav{display:inline-flex;background:var(--color-surface-alt);border:1px solid var(--color-border);border-radius:10px;padding:3px;gap:2px;margin-bottom:0;flex:none}
  .cg-yearsel{position:relative}
  /* Sélecteur d'année intégré (option B) : un seul conteneur bordé, chevrons fantômes, sans séparateurs */
  .cg-yeargrp{display:inline-flex;align-items:center;gap:2px;border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);padding:3px;height:38px}
  .cg-yearnav{width:30px;height:30px;border:none;background:transparent;border-radius:7px;color:var(--color-text-soft);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;transition:all .15s}
  .cg-yearnav:hover{background:var(--color-surface-alt);color:var(--color-primary)}
  .cg-yearbtn{display:inline-flex;align-items:center;gap:7px;background:transparent;border:none;border-radius:7px;padding:0 8px;height:30px;cursor:pointer;font-weight:700;font-size:15px;color:var(--color-text);transition:background .15s}
  .cg-yearbtn:hover{background:var(--color-surface-alt)}
  .cg-yearbtn .chev{transition:transform .2s ease}
  .cg-yearsel:has(#cg-year-pop:not([hidden])) .cg-yearbtn .chev{transform:rotate(180deg)}
  .cg-yearbtn .cg-year{min-width:0;font-size:15px}
  .cg-yearbtn>svg:first-child,.cg-yearbtn .chev{color:var(--color-text-soft)}
  #cg-year-pop{padding:12px;width:200px;min-width:0;left:auto;right:0}
  .cg-yeargrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .cg-yearcell{text-align:center;padding:8px 0;border-radius:8px;font-size:13px;color:var(--color-text-light);cursor:pointer}
  .cg-yearcell:hover{background:var(--color-surface-alt)}
  .cg-yearcell.cur{background:var(--color-primary);color:#fff;font-weight:700}
  .cg-yeartoday{border-top:1px solid var(--color-border-light);margin-top:10px;padding-top:8px;text-align:center;font-size:13px;color:var(--color-primary);font-weight:600;cursor:pointer}
  .mod-tab{border:none;background:transparent;cursor:pointer;font:inherit;font-size:14px;font-weight:600;color:var(--color-text-mute);border-radius:7px;padding:7px 18px}
  .mod-tab:hover{color:var(--color-text)}
  .mod-tab.active{color:#fff;background:var(--color-primary);box-shadow:0 2px 6px rgba(79,70,229,.32)}
  .mod-tab.active:hover{color:#fff}
  .mod-tab[hidden]{display:none}
  .empty-mod{text-align:center;color:var(--color-text-mute);padding:90px 20px}
  .empty-mod svg{color:var(--color-text-soft)}
  .empty-mod h2{font-size:18px;font-weight:700;color:var(--color-text);margin:14px 0 6px}
  .empty-mod p{font-size:14px}
  .cg-topbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .cg-nav{width:30px;height:30px;border:1px solid var(--color-border);background:var(--color-surface);border-radius:var(--radius-sm);cursor:pointer;color:var(--color-text-light);font-size:16px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
  .cg-nav:hover{border-color:var(--color-primary);color:var(--color-primary)}
  .cg-year{font-size:18px;font-weight:700;color:var(--color-text);min-width:52px;text-align:center}
  .cg-sub{font-size:12px;color:var(--color-text-soft)}
  .cg-ro{font-size:11px;font-weight:600;color:var(--color-text-mute);background:var(--color-surface-alt);border:1px solid var(--color-border);border-radius:999px;padding:3px 10px;margin-left:auto}
  .cg-pal{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:12px;min-height:34px}
  .cg-pal:empty{display:none}
  .cg-palhint{font-size:12px;color:var(--color-text-mute)}
  .cg-modes{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .cg-modes:empty{display:none}
  .cg-modeseg{display:inline-flex;align-items:center;height:38px;box-sizing:border-box;background:var(--color-surface-alt);border:1px solid var(--color-border);border-radius:10px;padding:3px;gap:2px}
  .cg-modebtn{border:none;background:transparent;cursor:pointer;font:inherit;font-size:13px;line-height:1;font-weight:600;color:var(--color-text-mute);border-radius:7px;padding:6px 14px}
  .cg-modebtn.on{color:#fff;background:var(--color-primary);box-shadow:0 2px 6px rgba(79,70,229,.32)}
  .cg-vacbtn{margin-left:auto;display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-light);font:inherit;font-size:13px;font-weight:500;line-height:1;cursor:pointer}
  .cg-vacbtn>svg{color:var(--color-text-soft)}
  .cg-vacbtn:hover{background:var(--color-surface-alt)}
  .cg-vacbtn.on{background:rgba(124,92,214,.14);border-color:rgba(124,92,214,.55);color:#6d28d9}
  .cg-vacbtn.on>svg{color:#6d28d9}
  .cg-modeinfo{display:inline-flex;align-items:center;height:38px;box-sizing:border-box;gap:7px;padding:0 13px;border-radius:10px;background:var(--color-surface-alt);color:var(--color-text-mute);font-size:13px;font-weight:600}
  .cg-pb{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--color-border);border-radius:var(--radius-md);padding:7px 12px;font-size:13px;line-height:1;font-weight:500;cursor:pointer;background:var(--color-surface);color:var(--color-text);transition:background .12s,border-color .12s}
  .cg-pb:hover{background:var(--color-surface-alt)}
  .cg-pb .cnt{line-height:1;display:inline-flex;align-items:center}
  .cg-gear{margin-left:auto;width:34px;height:34px;border:1px solid var(--color-border);background:var(--color-surface);border-radius:9px;cursor:pointer;color:var(--color-text-light);font-size:16px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
  .cg-gear:hover{border-color:var(--color-primary);color:var(--color-primary)}
  .cg-set{background:var(--color-surface-alt);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:16px 18px;margin-bottom:16px}
  .cg-set-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-mute);margin:0 0 10px}
  .cg-set-types{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .cg-set-t{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600}
  .cg-set-t input[type=color]{width:26px;height:26px;border:1px solid var(--color-border);border-radius:6px;padding:0;background:none;cursor:pointer}
  .cg-set-addt{display:inline-flex;align-items:center;gap:6px}
  .cg-set-addt input[type=text]{width:76px;height:32px;border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:0 8px;font:inherit;font-size:13px}
  .cg-set-addt input[type=color]{width:32px;height:32px;border:1px solid var(--color-border);border-radius:6px;padding:0;background:none;cursor:pointer}
  .cg-set-list{display:flex;flex-direction:column;gap:5px}
  .cg-set-trow{display:flex;align-items:center;gap:8px}
  .cg-set-trow input[type=color]{width:28px;height:28px;border:1px solid var(--color-border);border-radius:6px;padding:0;background:none;cursor:pointer;flex:none}
  .cg-tname{flex:1;height:32px;border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:0 8px;font:inherit;font-size:13px}
  .cg-grip{cursor:grab;color:var(--color-text-soft);user-select:none;font-size:13px;flex:none}
  .cg-imp{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-mute);white-space:nowrap;cursor:pointer}
  .cg-choose{display:flex;flex-direction:column;gap:8px}
  .cg-choose-b{display:flex;align-items:center;gap:9px;border:1px solid var(--color-border);background:var(--color-surface);border-radius:var(--radius-md);padding:11px 14px;font:inherit;font-size:14px;font-weight:500;color:var(--color-text);cursor:pointer;text-align:left}
  .cg-choose-b:hover{border-color:var(--color-primary);background:var(--color-surface-alt)}
  .cg-choose-b .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .cg-set-sub{font-size:12px;color:var(--color-text-mute);margin:-2px 0 16px}
  #cg-settings .cg-set-h{color:var(--color-text-mute);font-weight:800;letter-spacing:.09em;font-size:11px}
  #cg-settings .cg-set-trow,#cg-settings .cg-set-bal{background:transparent;border:none;border-bottom:1px solid var(--color-border-light);border-radius:0;padding:10px 2px}
  #cg-settings .cg-set-list>div:last-child{border-bottom:none}
  #cg-settings .cg-set-trow input[type=color]{border-radius:50%}
  #cg-settings .cg-imp{border:1px solid var(--color-border);border-radius:999px;padding:4px 10px;background:var(--color-surface);color:var(--color-text-mute);gap:6px}
  #cg-settings .cg-imp input{accent-color:var(--color-primary);margin:0}
  #cg-settings .cg-imp:has(input:checked){background:rgba(79,70,229,.10);border-color:var(--color-primary);color:var(--color-primary);font-weight:600}
  #cg-settings .cg-dragging{opacity:.4}
  #cg-settings .cg-drop{box-shadow:0 0 0 2px var(--color-primary);border-radius:var(--radius-md)}
  #cg-settings .cg-set-trow input[type=color]{border-radius:8px}
  #cg-settings .cg-set-trow .cg-tname,#cg-settings .cg-set-bal input,#cg-settings .cg-set-bal select{background:var(--color-surface)}
  #cg-settings .cg-set-ic{border-radius:50%;background:var(--color-surface)}
  .cg-set-bal select[data-cgb-src]{color:var(--color-text-mute)}
  .cg-set-bal{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:8px 0;border-bottom:1px solid var(--color-border-light);font-size:13px}
  .cg-set-bal.arch{opacity:.55}
  .cg-set-bal .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .cg-set-bal select{height:32px;border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:0 6px;font:inherit;font-size:13px;background:var(--color-surface)}
  .cg-set-bal input[type=text]{flex:1;min-width:80px;height:32px;border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:0 8px;font:inherit;font-size:13px}
  .cg-set-bal input[type=number]{width:60px;height:32px;border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:0 8px;font:inherit;font-size:13px;text-align:right}
  .cg-set-u{color:var(--color-text-mute);font-size:12px}
  #cg-settings .cgs2-sub{font-size:12px;color:var(--color-text-mute);margin:-2px 0 14px}
  #cg-settings .cgs2-sec{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  #cg-settings .cgs2-hd{display:flex;align-items:baseline;gap:8px}
  #cg-settings .cgs2-lbl{font-size:11px;font-weight:800;letter-spacing:.09em;color:var(--color-text-mute)}
  #cg-settings .cgs2-hint{font-size:11px;color:var(--color-text-soft)}
  #cg-settings .cgs2-box{background:var(--color-surface-alt);border:1px solid var(--color-border-light);border-radius:14px;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:46px}
  #cg-settings .cgs2-box.cgs2-secdrop{box-shadow:inset 0 0 0 2px var(--color-primary)}
  #cg-settings .cgs2-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;background:var(--color-surface);border:1px solid var(--color-border-light);position:relative}
  #cg-settings .cgs2-row.cgs2-dpb{box-shadow:0 -2px 0 0 var(--color-primary)}
  #cg-settings .cgs2-row.cgs2-dpa{box-shadow:0 2px 0 0 var(--color-primary)}
  #cg-settings .cgs2-row.dragging{opacity:.4}
  #cg-settings .cgs2-grip{cursor:grab;color:var(--color-text-soft);user-select:none;font-size:13px;flex:none;touch-action:none}
  #cg-settings .cgs2-swwrap{position:relative;display:inline-flex;flex:none}
  #cg-settings .cgs2-dot{width:20px;height:20px;border-radius:50%;border:1px solid rgba(0,0,0,.12);padding:0;cursor:pointer;flex:none;transition:box-shadow .1s}
  #cg-settings .cgs2-dot:hover{box-shadow:0 0 0 2px var(--color-surface),0 0 0 4px var(--color-text-soft)}
  #cg-settings .cgs2-sws{position:absolute;top:28px;left:0;z-index:25;background:var(--color-surface);border:1px solid var(--color-border);border-radius:12px;box-shadow:0 16px 40px rgba(20,20,40,.18);padding:10px;display:flex;flex-wrap:wrap;gap:7px;width:168px}
  #cg-settings .cgs2-sws[hidden]{display:none}
  #cg-settings .cgs2-csw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:none;padding:0;flex:none}
  #cg-settings .cgs2-csw.active{box-shadow:0 0 0 2px var(--color-surface),0 0 0 4px var(--color-text-soft)}
  #cg-settings .cgs2-cust{background:conic-gradient(from 90deg,#f43f5e,#fb923c,#facc15,#4ade80,#2dd4bf,#38bdf8,#818cf8,#e879f9,#f43f5e);position:relative;border:none;-webkit-appearance:none;appearance:none}
  #cg-settings .cgs2-cust:hover{box-shadow:0 0 0 2px var(--color-surface),0 0 0 4px var(--color-text-soft)}
  #cg-settings .cgs2-custinput{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;border:none;padding:0}
  #cg-settings .cgs2-name{width:60px;flex:none;font-size:14px;font-weight:600;border:1px solid transparent;border-radius:6px;padding:4px 6px;background:transparent;font-family:inherit;color:var(--color-text)}
  #cg-settings .cgs2-name:hover{border-color:var(--color-border-light)}
  #cg-settings .cgs2-name:focus{border-color:var(--color-primary);background:var(--color-surface);outline:none}
  #cg-settings .cgs2-chips{flex:1;display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-width:0}
  #cg-settings .cgs2-chipwrap{position:relative;display:inline-flex}
  #cg-settings .cgs2-chip{display:flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;border:1px solid var(--color-border);background:var(--color-surface);font-size:13px;cursor:pointer;white-space:nowrap}
  #cg-settings .cgs2-chip-lbl{color:var(--color-text);font-weight:600}
  #cg-settings .cgs2-chip-d{font-weight:400;color:var(--color-text-mute)}
  #cg-settings .cgs2-chip.open{border-color:var(--color-primary);background:rgba(79,70,229,.10)}
  #cg-settings .cgs2-chip.open .cgs2-chip-lbl,#cg-settings .cgs2-chip.open .cgs2-chip-d{color:var(--color-primary)}
  #cg-settings .cgs2-add{padding:5px 11px;border-radius:999px;border:1px dashed #c9c5f6;color:var(--color-primary);font-size:13px;cursor:pointer;white-space:nowrap;flex:none;background:var(--color-surface)}
  #cg-settings .cgs2-add:hover{background:rgba(79,70,229,.07)}
  #cg-settings .cgs2-rule{flex:1;color:var(--color-text-mute);font-size:12px;min-width:0}
  #cg-settings .cgs2-imp{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-mute);cursor:pointer;flex:none;border:1px solid var(--color-border);border-radius:999px;padding:4px 10px;background:var(--color-surface)}
  #cg-settings .cgs2-imp.on{background:rgba(79,70,229,.10);border-color:var(--color-primary);color:var(--color-primary);font-weight:600}
  #cg-settings .cgs2-imp input{accent-color:var(--color-primary);margin:0}
  #cg-settings .cgs2-x{background:transparent;border:1px solid transparent;color:var(--color-text-soft);width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1;display:inline-flex;align-items:center;justify-content:center;flex:none;transition:all .15s}
  #cg-settings .cgs2-x:hover{color:#fff;background:#e5484d;border-color:#e5484d}
  #cg-settings .cgs2-pop{position:absolute;top:34px;left:0;z-index:20;background:var(--color-surface);border:1px solid var(--color-border);border-radius:12px;box-shadow:0 16px 40px rgba(20,20,40,.22);padding:12px;display:flex;flex-direction:column;gap:10px;width:230px}
  #cg-settings .cgs2-pop-hd{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700}
  #cg-settings .cgs2-pop-x{background:none;border:none;color:var(--color-text-soft);font-size:15px;cursor:pointer;line-height:1;padding:0}
  #cg-settings .cgs2-per-inp{width:100%;height:30px;border:1px solid var(--color-border);border-radius:8px;padding:0 8px;font:inherit;font-size:13px;box-sizing:border-box}
  #cg-settings .cgs2-step{display:flex;align-items:center;justify-content:center;gap:8px}
  #cg-settings .cgs2-step-b{width:30px;height:30px;border-radius:999px;background:var(--color-surface-alt);border:1px solid var(--color-border-light);color:var(--color-text-mute);cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center}
  #cg-settings .cgs2-step-b:hover{background:rgba(79,70,229,.10);color:var(--color-primary);border-color:var(--color-primary)}
  #cg-settings .cgs2-step-in{width:56px;height:32px;text-align:center;font-size:15px;font-weight:700;border:1px solid var(--color-border);border-radius:8px;padding:0 4px;font-family:inherit;-moz-appearance:textfield;appearance:textfield}

  .cat-name:hover{border-color:var(--color-border-light)}
  .cat-name:focus{border-color:var(--color-primary);background:var(--color-surface);outline:none}
  .cat-sws{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;padding-left:30px}
  .cat-sws[hidden]{display:none}
  .csw{width:22px;height:22px;border-radius:50%;cursor:pointer;transition:box-shadow .1s}
  .csw.active{box-shadow:0 0 0 2px var(--color-surface-alt),0 0 0 4px var(--color-text-soft)}
  .cat-sws{position:relative}
  .cat-cust{background:conic-gradient(from 90deg,#f43f5e,#fb923c,#facc15,#4ade80,#2dd4bf,#38bdf8,#818cf8,#e879f9,#f43f5e);border:none;-webkit-appearance:none;appearance:none}
  .cat-cust:hover{box-shadow:0 0 0 2px var(--color-surface-alt),0 0 0 4px var(--color-text-soft)}
  .cat-custinput{position:absolute;left:10px;bottom:10px;width:1px;height:1px;opacity:0;pointer-events:none;border:none;padding:0}
  .dashed-add{display:inline-flex;align-items:center;gap:5px;border:1px dashed var(--color-primary);color:var(--color-primary);background:transparent;border-radius:var(--radius-sm);padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer;margin-top:12px}
  .set-data{display:flex;gap:8px}
  .set-data .btn{flex:1}
  .sv-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-mute);margin:0 0 12px}
  .sv-bars{display:flex;align-items:flex-end;gap:14px;height:120px}
  .sv-yb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;cursor:pointer;gap:4px}
  .sv-yb .sv-bar{width:100%;max-width:60px;border-radius:6px 6px 0 0;background:#c7d2fe;transition:background .15s}
  .sv-yb:hover .sv-bar{background:#a5b4fc}
  .sv-yb.sel .sv-bar{background:var(--color-primary)}
  .sv-yt{font-size:11px;color:var(--color-text-mute)}
  .sv-yl{font-size:12px;color:var(--color-text-mute)}
  .sv-yb.sel .sv-yl{color:var(--color-text);font-weight:700}
  .sv-sep{border-top:1px solid var(--color-border-light);margin-top:14px;padding-top:14px}
  .sv-title{font-size:14px;font-weight:700;color:var(--color-text);margin:0 0 16px}
  .sv-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .sv-row{margin-bottom:12px}
  .sv-rtop{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;gap:8px}
  .sv-nm{color:var(--color-text);font-weight:600}
  .sv-vl{color:var(--color-text);white-space:nowrap;font-variant-numeric:tabular-nums}
  .sv-arch{font-size:10px;color:var(--color-text-soft);background:var(--color-surface-alt);border-radius:999px;padding:1px 6px;margin-left:5px;font-weight:400}
  .sv-dt{font-size:10px;color:var(--color-text-soft);margin:2px 0 4px}
  .sv-track{height:8px;background:var(--color-border-light);border-radius:4px;overflow:hidden}
  .sv-fill{height:100%;border-radius:4px}
  @media(max-width:560px){.sv-grid{grid-template-columns:1fr;gap:18px}}
  .stat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
  .stat-c{background:var(--color-surface-alt);border-radius:var(--radius-md);padding:12px}
  .stat-l{font-size:11px;color:var(--color-text-mute);text-transform:uppercase;letter-spacing:.06em}
  .stat-v{font-size:22px;font-weight:700;color:var(--color-text);margin-top:3px;font-variant-numeric:tabular-nums}
  .stat-s{font-size:11px;color:var(--color-text-soft);margin-top:1px}
  .stat-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--color-border-light)}
  .stat-row:last-child{border-bottom:none}
  .stat-row-m{flex:1;min-width:0}
  .stat-tn{font-size:14px;font-weight:600;color:var(--color-text)}
  .stat-td{font-size:11px;color:var(--color-text-soft);margin-top:1px}
  .stat-row-r{text-align:right;flex:none}
  .stat-cost{font-size:15px;font-weight:700;color:var(--color-text);font-variant-numeric:tabular-nums}
  .stat-ratio{font-size:11px;color:var(--color-primary);font-weight:600;margin-top:1px}
  .stat-arch{font-size:10px;color:var(--color-text-soft);background:var(--color-surface-alt);border-radius:999px;padding:1px 7px;margin-left:4px;font-weight:500}
  .stat-year{display:flex;align-items:baseline;justify-content:space-between;margin:20px 0 6px;font-size:14px;font-weight:700;color:var(--color-text)}
  .stat-year:first-child{margin-top:0}
  .stat-year-tot{font-size:13px;font-weight:700;color:var(--color-text-light);font-variant-numeric:tabular-nums}
  @media(max-width:640px){.stat-cards{gap:8px}.stat-v{font-size:18px}}
  .av-mini{display:inline-flex;width:20px;height:20px;border-radius:50%;color:#fff;align-items:center;justify-content:center;font-size:10px;font-weight:800;vertical-align:middle}
  .exp-amt{flex:none;width:96px}
  .drag-handle{cursor:grab;color:var(--color-text-soft);user-select:none;font-size:13px;flex:none;width:14px;text-align:center;touch-action:none}
  .drag-handle:active{cursor:grabbing}
  #exp-panel{overflow:visible}
  .exp-head{display:flex;align-items:center;gap:10px;padding:10px 2px;background:var(--color-surface);border-bottom:1px solid var(--color-border);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-mute)}
  .exp-head .eh-drag{width:14px;flex:none}
  .exp-head .eh-box{width:20px;flex:none;text-align:center;font-size:12px;cursor:default}
  .exp-head .eh-label{flex:2;min-width:90px}
  .exp-head .eh-rep{flex:2.2;min-width:120px}
  .exp-head .eh-part{flex:1;text-align:right}
  .exp-head .eh-amt{width:96px;flex:none;text-align:right}
  .exp-head .eh-bubble{width:20px;flex:none}
  .exp-head .eh-del{width:22px;flex:none}

  /* Personnes & parts (fusion) */
  .ppcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
  .ppcard{position:relative;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);box-shadow:var(--shadow-card);padding:15px 16px}
  .ppcard-h{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .ppav{width:40px;height:40px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;cursor:pointer;flex:none}
  .ppav:hover{box-shadow:0 0 0 2px var(--color-surface),0 0 0 4px var(--color-text-soft)}
  .ppav.static{cursor:default}
  .ppav.static:hover{box-shadow:none}
  .ppname{font-weight:700;font-size:15px}
  .ppbadges{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
  .ppbadge{font-size:10px;background:var(--color-surface-alt);color:var(--color-text-secondary);padding:2px 8px;border-radius:20px}
  .ppbadge.muted{color:var(--color-text-soft)}
  .ppcard-total{font-size:22px;font-weight:700;color:var(--color-primary);margin-bottom:11px}
  .ppadd{border:2px dashed rgba(79,70,229,.35);background:rgba(79,70,229,.03);box-shadow:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:150px}
  .ppcard.dragging{opacity:.4}
  .ppcard.dp-before{box-shadow:-3px 0 0 0 var(--color-primary)}
  .ppcard.dp-after{box-shadow:3px 0 0 0 var(--color-primary)}

  .addrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .actions{margin-top:34px;padding-top:20px;border-top:1px solid var(--color-border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
  .actions-left{font-size:11px;color:var(--color-text-mute);font-family:var(--font-mono)}
  .btn-group{display:flex;gap:8px}
  .dashed{display:inline-flex;align-items:center;gap:6px;border:2px dashed rgba(79,70,229,.3);background:rgba(79,70,229,.03);color:var(--color-primary);border-radius:var(--radius-sm);padding:8px 14px;font-size:11px;font-weight:700;line-height:1;text-transform:uppercase;letter-spacing:.04em;cursor:pointer}
  .dashed:hover{border-color:var(--color-primary);background:rgba(79,70,229,.06)}
  .login-ov{position:fixed;inset:0;background:var(--color-bg);display:flex;align-items:center;justify-content:center;z-index:600;padding:20px}
  .login-ov[hidden]{display:none}
  .login-box{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:28px 26px;width:min(360px,100%);display:flex;flex-direction:column;gap:12px}
  .login-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--color-primary)}
  .login-title{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
  .boot-spin{width:34px;height:34px;border:3px solid var(--color-border);border-top-color:var(--color-primary);border-radius:50%;animation:bootspin .7s linear infinite}
  @keyframes bootspin{to{transform:rotate(360deg)}}
  .login-err{font-size:12px;color:var(--color-primary);min-height:14px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(140%);background:var(--color-text);color:#fff;padding:11px 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;box-shadow:var(--shadow-md);transition:transform .25s,opacity .25s;z-index:3000;opacity:0;visibility:hidden;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible}
  @media(max-width:560px){.global-stats{grid-template-columns:1fr 1fr;gap:14px 0}.stat:nth-child(2){border-right:none;padding-right:0}.stat:nth-child(3){padding-left:0}}
  /* ===== Smartphone : largeur maximale + compactage ===== */
  @media(max-width:640px){
    .container{padding:14px 12px 40px}
    .header{padding:18px 16px}
    .header.hero{gap:14px}
    .hero-total{font-size:30px}
    .section-title{font-size:16px}
    .panel-body{padding:14px 12px}
    .exp-row{gap:7px;padding:9px 0}
    .exp-label{min-width:0}
    .exp-rep{min-width:0;flex:1.3}
    .exp-amt{width:72px}
    .exp-head{gap:7px;padding:9px 0}
    .exp-head .eh-rep{min-width:0;flex:1.3}
    .exp-head .eh-amt{width:72px}
    .exp-comment{padding-left:10px}
    .cell-input,.cell-sel,.fld{font-size:16px}
    .ql-editor,.rt-area{font-size:16px}
    .fld,.date-field{min-width:0}
    input[type="date"].fld{-webkit-appearance:none;appearance:none;width:100%;min-width:0;max-width:100%;text-align:center}
    .modal-body{overflow-x:hidden}
    .matrix{table-layout:fixed;width:100%}
    .matrix col:first-child{width:44%}
    .matrix th.mx-row,.matrix th.mx-corner{position:sticky;left:0;z-index:2;background:var(--color-surface)}
    .matrix th.mx-row{white-space:normal;padding:7px 10px}
    .mx-rowedit{flex-wrap:nowrap}
    .mx-rowedit .mx-rname{white-space:normal;overflow:visible;text-overflow:clip}
    .matrix td.mx-cell{padding:5px}
  }
  /* ===== Portrait : on masque les infos secondaires (réaffichées en paysage) ===== */
  @media(max-width:640px) and (orientation:portrait){
    .exp-part,.exp-head .eh-part{display:none}
    .exp-rep,.exp-head .eh-rep{display:none}
    .drag-handle,.exp-head .eh-drag{display:none}
    .mx-grip{display:none}
    .hero-names{display:none}
    .mx-cmeta{display:none}
    .mx-bandtxt{display:none}
    /* Ligne 1 : onglets (app) + bouton compte ; ligne 2 : sélecteur + Notes + actions du module */
    .topbar .mod-nav,.cg-topbar .mod-nav{order:1;margin-right:auto}
    .topbar .acct-btn,.cg-topbar .acct-btn{order:2}
    .tb-spacer{order:3;flex:0 0 100%;height:0;margin:0}
    .topbar .tb-group{order:4;flex:1 1 100%;min-width:0}
    .topbar .trip-switch{margin-right:auto}
    .cg-topbar .cg-ro{order:4}
    .cg-topbar .cg-yearsel{order:5;margin-right:auto}
    #notes-btn{order:6;width:auto;gap:7px;padding:0 14px;font-size:14px;font-weight:600}
    #notes-btn .notes-lbl{display:inline}
    .topbar .kebab-wrap{order:7}
    .cg-topbar #cg-open-set{order:7}
    #cg-year-pop{left:0;right:auto}
  }
  /* ===== Smartphone en paysage : largeur max + commentaires discrets ===== */
  @media(orientation:landscape) and (max-height:600px){
    .container{padding:14px 14px 40px}
    .panel-body{padding:14px 14px}
    .header{padding:18px 16px}
    .exp-comment{font-size:11px}
    .exp-comment-body h1,.exp-comment-body h2,.exp-comment-body h3{font-size:11px}
  }
</style>
</head>
<body>
<div class="container">
  <div id="module-voyages">
  <div class="topbar">
    <nav class="mod-nav">
      <button type="button" class="mod-tab active" data-mod="voyages">Voyages</button>
      <button type="button" class="mod-tab" data-mod="conges">Congés</button>
    </nav>
    <div class="tb-spacer"></div>
    <div class="tb-group">
    <div class="trip-switch">
      <button id="trip-btn" class="trip-btn">
        <span id="trip-current"></span>
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" class="chev"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div id="trip-menu" class="dropdown" hidden>
        <div class="dd-list" id="trip-list"></div>
        <div class="dd-div"></div>
        <button class="dd-item" id="trip-new"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Nouveau voyage</button>
        <button class="dd-item" id="trip-dup"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg> Dupliquer ce voyage</button>
      </div>
    </div>
    <button id="notes-btn" class="icon-btn" title="Notes du voyage" aria-label="Notes du voyage"><span class="notes-ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h14v16H5zM9 9h6M9 13h6"/></svg></span><span class="notes-lbl">Notes</span></button>
    <div class="kebab-wrap">
      <button id="kebab-btn" class="icon-btn" title="Actions" aria-label="Actions">⋮</button>
      <div id="kebab-menu" class="dropdown dropdown-right" hidden>
        <button class="dd-item" id="btn-stats"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18M8 16V9M13 16V5M18 16v-4"/></svg> Statistiques</button>
        <button class="dd-item" id="btn-settings"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Réglages</button>
      </div>
    </div>
    </div>
    <button type="button" class="acct-btn" id="acct-btn" title="Compte et paramètres" aria-label="Compte et paramètres" hidden>M</button>
    <input id="file-input" type="file" accept="application/json" style="display:none"/>
  </div>
  <header class="header hero">
    <div class="hero-left">
      <div class="eyebrow">Budget prévisionnel</div>
      <input id="trip-name" type="text"/>
      <div class="hero-meta"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--color-text-mute);flex:none"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M16 3v4M8 3v4M4 11h16"/></svg><span id="hero-range"></span></div>
      <div class="hero-people" id="hero-people"></div>
    </div>
    <div class="hero-right">
      <div class="hero-tlabel">Total à prévoir</div>
      <div class="hero-total num-f" id="st-total">—</div>
      <div class="hero-bar" id="hero-bar"></div>
      <div class="hero-legend" id="hero-legend"></div>
    </div>
  </header>

  <div id="view-budget">
  <section>
    <div class="sec-head">
      <h2 class="section-title" style="flex:1;margin:0">Personnes &amp; périodes</h2>
      <button class="btn primary sm" data-personadd>+ Personne</button>
      <button class="btn primary sm" data-padd>+ Période</button>
    </div>
    <div class="panel"><div class="panel-body" style="overflow-x:auto"><table id="matrix" class="matrix"></table></div></div>
  </section>

  <section>
    <div class="sec-head">
      <h2 class="section-title" style="flex:1;margin:0">Dépenses <span class="tip" id="resa-count"></span></h2>
      <button id="ex-add-btn" class="btn primary sm">+ Dépense</button>
    </div>
    <div class="panel" id="exp-panel"><div class="panel-body">
      <div id="expenses"></div>
    </div></div>
  </section>

  <section>
    <h2 class="section-title">Parts par personne</h2>
    <div id="parts" class="ppcards"></div>
  </section>
  </div>
  </div>
  <div id="module-conges" hidden>
    <div class="cg-topbar">
      <nav class="mod-nav">
        <button type="button" class="mod-tab" data-mod="voyages">Voyages</button>
        <button type="button" class="mod-tab active" data-mod="conges">Congés</button>
      </nav>
      <div class="tb-spacer"></div>
      <span class="cg-ro" id="cg-ro" hidden>Lecture seule</span>
      <div class="cg-yearsel">
        <div class="cg-yeargrp">
          <button type="button" id="cg-yprev" class="cg-yearnav prev" aria-label="Année précédente"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 6l-6 6 6 6"/></svg></button>
          <button type="button" id="cg-year-btn" class="cg-yearbtn"><span class="cg-year" id="cg-year">—</span><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" class="chev"><path d="M6 9l6 6 6-6"/></svg></button>
          <button type="button" id="cg-ynext" class="cg-yearnav next" aria-label="Année suivante"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 6l6 6-6 6"/></svg></button>
        </div>
        <div id="cg-year-pop" class="dropdown" hidden></div>
      </div>
      <button type="button" id="cg-open-set" class="icon-btn" title="Réglages" aria-label="Réglages"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      <button type="button" class="acct-btn" id="cg-acct-btn" title="Compte et paramètres" aria-label="Compte et paramètres" hidden>M</button>
      <input id="cg-file-input" type="file" accept="application/json" style="display:none"/>
    </div>
    <h2 class="section-title">Calendrier</h2>
    <div class="panel"><div class="panel-body">
      <div class="cg-modes" id="cg-modes"></div>

  /* ===== 2. Module Voyages (données, rendu, dépenses, parts, réglages) ===== */
  function seed(){

  function migrate(s){
    if(s&&!s.categories)s.categories=DEFAULT_CATS.map(function(c){return {id:c.id,name:c.name,color:c.color};});
    if(s&&s.trips)s.trips.forEach(function(t){if(!t.emails)t.emails={};if(t.periods)t.periods.sort(function(a,b){var x=a.start||"",y=b.start||"";return x<y?-1:x>y?1:0;});var pids=(t.periods||[]).map(function(p){return p.id;});(t.expenses||[]).forEach(function(e){
      if(e.scope==="individual"){e.scope="custom";e.people=e.person?[e.person]:[];delete e.person;}
      else if(e.scope==="all"){e.scope="sejour";e.periods=pids.slice();if(!e.basis)e.basis="nights";}
      else if(e.scope!=="custom"&&e.scope!=="sejour"){var pid=e.scope;e.scope="sejour";e.periods=[pid];if(!e.basis)e.basis="nights";}
    });});
    return s;}
  function catById(id){var a=store.categories||[];for(var i=0;i<a.length;i++)if(a[i].id===id)return a[i];return null;}
  function loadStore(){
    try{var s=JSON.parse(localStorage.getItem(STORE_KEY));if(s&&s.trips&&s.trips.length){s.trips.forEach(function(t){if(!t.id)t.id=uid();});if(!s.activeId||!s.trips.some(function(t){return t.id===s.activeId;}))s.activeId=s.trips[0].id;return migrate(s);}}catch(e){}
    try{var old=JSON.parse(localStorage.getItem(KEY));if(old&&old.people){if(!old.id)old.id=uid();return migrate({trips:[old],activeId:old.id});}}catch(e){}
    var t=seedTrip();return {trips:[t],activeId:t.id};
  }
  function userEmail(){return (CLOUD&&fbUser&&fbUser.email)?fbUser.email.trim().toLowerCase():null;}
  function tripEmails(t){var e=t.emails||{},out=[];for(var k in e){if(e[k]&&String(e[k]).trim())out.push(String(e[k]).trim().toLowerCase());}return out;}
  function canSee(t){var em=tripEmails(t);if(!em.length)return true;var u=userEmail();return u?em.indexOf(u)>=0:true;}
  function visibleTrips(){return store.trips.filter(canSee);}
  function tripStart(t){var ps=(t.periods||[]).map(function(p){return p.start;}).filter(Boolean).sort();return ps[0]||"";}
  function byStartDesc(a,b){var sa=tripStart(a),sb=tripStart(b);if(sa===sb)return 0;if(!sa)return 1;if(!sb)return -1;return sa<sb?1:-1;}
  function mainTrips(){return visibleTrips().filter(function(t){return !t.archived;}).sort(byStartDesc);}
  function archivedTrips(){return visibleTrips().filter(function(t){return t.archived;}).sort(byStartDesc);}
  function sortPeriods(arr){if(arr)arr.sort(function(a,b){var x=a.start||"",y=b.start||"";return x<y?-1:x>y?1:0;});return arr;}
  function tNights(p){var d=Math.round((Date.parse(p.end)-Date.parse(p.start))/86400000);return d>0?d:0;}
  function tDays(trip,p){var n=tNights(p);if(n<=0)return 0;var base=n+1,ps=trip.periods||[];for(var i=0;i<ps.length;i++){if(ps[i]!==p&&ps[i].end===p.start){base-=1;break;}}return base;}
  function tMembers(trip,p){return (p.members||[]).filter(function(x){return (trip.people||[]).indexOf(x)>=0;});}
  function personInTrip(trip){var u=userEmail();if(!u)return null;var em=trip.emails||{};for(var k in em){if(em[k]&&String(em[k]).trim().toLowerCase()===u)return k;}return null;}
  function personTripCost(trip,name){var total=0;(trip.expenses||[]).forEach(function(e){
    if(e.scope==="custom"){var mc=(e.people||[]).filter(function(x){return (trip.people||[]).indexOf(x)>=0;});if(mc.indexOf(name)>=0&&mc.length)total+=e.amount/mc.length;}
    else{var sel;if(e.scope==="all")sel=trip.periods||[];else if(e.scope==="sejour"){var ids=e.periods||[];sel=(trip.periods||[]).filter(function(p){return ids.indexOf(p.id)>=0;});}else sel=(trip.periods||[]).filter(function(p){return p.id===e.scope;});
      var fn=(e.basis==="days")?function(p){return tDays(trip,p);}:tNights,tw=0;sel.forEach(function(p){tw+=fn(p);});
      if(tw>0)sel.forEach(function(p){var m=tMembers(trip,p);if(m.indexOf(name)>=0&&m.length)total+=e.amount*fn(p)/tw/m.length;});}
  });return total;}
  function personTripDays(trip,name){var d=0;(trip.periods||[]).forEach(function(p){if((p.members||[]).indexOf(name)>=0)d+=tDays(trip,p);});return d;}
  function tripRange(t){var ps=(t.periods||[]).filter(function(p){return p.start&&p.end;});if(!ps.length)return"";var mn=ps[0].start,mx=ps[0].end;ps.forEach(function(p){if(p.start<mn)mn=p.start;if(p.end>mx)mx=p.end;});return frDate(mn,{day:"numeric",month:"short"})+" → "+frDate(mx,{day:"numeric",month:"short",year:"numeric"});}
  function tripMainYear(t){var by={};(t.periods||[]).forEach(function(p){if(!p.start||!p.end)return;var d=new Date(p.start+"T00:00:00"),e=new Date(p.end+"T00:00:00");while(d<e){var y=d.getFullYear();by[y]=(by[y]||0)+1;d.setDate(d.getDate()+1);}});var best="",max=-1;for(var y in by){if(by[y]>max){max=by[y];best=y;}}return best||((tripStart(t)||"").slice(0,4));}
  function activeTrip(){
    for(var i=0;i<store.trips.length;i++)if(store.trips[i].id===store.activeId){if(canSee(store.trips[i]))return store.trips[i];break;}
    var t=mainTrips()[0]||visibleTrips()[0]||store.trips[0];
    if(t&&store.activeId!==t.id)store.activeId=t.id;
    return t;
  }
  function save(){var j=JSON.stringify(store);try{localStorage.setItem(STORE_KEY,j);}catch(e){} if(CLOUD&&fbUser&&db){clearTimeout(cloudTimer);cloudTimer=setTimeout(function(){var jj=JSON.stringify(store);lastJson=jj;try{db.collection("budgets").doc(SHARED).set({json:jj});}catch(e){}},700);}}
  function renderTripSwitch(){
    var cur=activeTrip();
    var lbl=document.getElementById("trip-current");if(lbl)lbl.textContent=cur?(cur.tripName||"Sans titre"):"—";
    var list=document.getElementById("trip-list");if(!list)return;
    var main=mainTrips(),arch=archivedTrips(),multi=visibleTrips().length>1;
    function row(t,isA){var active=t.id===store.activeId;
      return '<button class="dd-trip'+(active?" active":"")+'" data-tripsel="'+t.id+'"><span class="dd-check">'+(active?CHK:'')+'</span><span class="dd-tname">'+esc(t.tripName||"Sans titre")+'</span><span class="dd-link" data-triplink="'+t.id+'" title="Copier le lien">'+LINKIC+'</span><span class="dd-ico" data-trip'+(isA?'unarch':'arch')+'="'+t.id+'" title="'+(isA?'Désarchiver':'Archiver')+'">'+(isA?UNARCH:ARCH)+'</span>'+(multi?'<span class="dd-del" data-tripdel="'+t.id+'" title="Supprimer">×</span>':'')+'</button>';
    }
    var html=main.map(function(t){return row(t,false);}).join("")||'<div class="meta" style="padding:8px 10px">Aucun voyage</div>';
    if(arch.length)html+='<div class="dd-div"></div><button class="dd-item" id="arch-toggle" type="button"><span class="dd-ico" style="opacity:1">'+ARCH+'</span> Archivés ('+arch.length+')</button><div id="arch-list" hidden>'+arch.map(function(t){return row(t,true);}).join("")+'</div>';
    list.innerHTML=html;
  }
  function hideMenus(){var a=document.getElementById("trip-menu"),b=document.getElementById("kebab-menu"),cgm=document.getElementById("cg-kebab-menu");if(a)a.hidden=true;if(b)b.hidden=true;if(cgm)cgm.hidden=true;}
  function toggleMenu(id){var m=document.getElementById(id),o=document.getElementById(id==="trip-menu"?"kebab-menu":"trip-menu");if(o)o.hidden=true;if(m)m.hidden=!m.hidden;}
  function switchTrip(id){store.activeId=id;state=activeTrip();save();renderTripSwitch();renderAll();syncHash();}
  var routeLock=false,routedOnce=false;
  function slugify(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"")||"voyage";}
  function tripSlug(t){if(!t)return"";var base=slugify(t.tripName);var same=store.trips.filter(function(x){return slugify(x.tripName)===base;});if(same.length>1)return base+"-"+String(t.id).replace(/[^a-z0-9]/gi,"").slice(-4);return base;}
  function tripBySlug(slug){var ts=store.trips.filter(canSee),i;for(i=0;i<ts.length;i++)if(tripSlug(ts[i])===slug)return ts[i];for(i=0;i<ts.length;i++)if(slugify(ts[i].tripName)===slug)return ts[i];return null;}
  function notesOpen(){return !!(modalCtx&&modalCtx.type==="notes");}
  function latestTripId(){var ts=store.trips.filter(canSee);if(!ts.length)ts=store.trips;var best=null,bs="";ts.forEach(function(t){var s=tripStart(t)||"";if(best===null||s>bs){bs=s;best=t;}});return best?best.id:((store.trips[0]||{}).id);}
  function tripURL(t){return location.origin+location.pathname+"#voyages-"+tripSlug(t);}
  function syncHash(){if(routeLock)return;var h;if(curModule==="conges")h="#conges";else{if(!state)return;h="#voyages-"+tripSlug(state);}if(location.hash!==h){routeLock=true;location.hash=h;setTimeout(function(){routeLock=false;},0);}}
  function applyHash(){if(!store||!store.trips)return;var raw=decodeURIComponent((location.hash||"").replace(/^#/,"")),low=raw.toLowerCase();
    if(low.indexOf("cong")===0){if(moduleAccess.conges)setModule("conges");return;}
    if(low.indexOf("voyage")===0){setModule("voyages");var slug=raw.replace(/^voyages?-?/i,""),id=null;if(slug){var t=tripBySlug(slug);if(t)id=t.id;}if(!id)id=latestTripId();if(id&&id!==store.activeId){store.activeId=id;state=activeTrip();renderTripSwitch();renderAll();}return;}
  }
  function bootRoute(){if(routedOnce)return;routedOnce=true;window.addEventListener("hashchange",function(){if(routeLock)return;applyHash();});if((location.hash||"").replace(/^#\/?/,"").length)applyHash();else syncHash();}
  function fallbackCopy(txt){var i=document.createElement("textarea");i.value=txt;i.style.position="fixed";i.style.opacity="0";document.body.appendChild(i);i.focus();i.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(i);}
  function copyLink(url){function ok(){toast("Lien copié");}try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(ok,function(){fallbackCopy(url);ok();});return;}}catch(e){}fallbackCopy(url);ok();}
  function archiveTrip(id,val){var t=store.trips.filter(function(x){return x.id===id;})[0];if(!t)return;t.archived=val;if(val&&store.activeId===id){var m=mainTrips();if(m[0])store.activeId=m[0].id;}save();state=activeTrip();renderTripSwitch();renderAll();syncHash();toast(val?"Voyage archivé":"Voyage désarchivé");}
  function addTrip(){var t={id:uid(),tripName:"Nouveau voyage",seqP:1,seqE:1,people:[],periods:[],expenses:[],colors:{},emails:{}};store.trips.push(t);switchTrip(t.id);toast("Nouveau voyage");}
  function dupTrip(){var t=JSON.parse(JSON.stringify(state));t.id=uid();t.tripName=(state.tripName||"Voyage")+" (copie)";t.expenses=[];t.seqE=1;t.archived=false;store.trips.push(t);switchTrip(t.id);toast("Voyage dupliqué");}
  function delTripById(id){if(store.trips.length<=1){toast("Au moins un voyage");return;}if(!confirm("Supprimer ce voyage de l'historique ?"))return;store.trips=store.trips.filter(function(t){return t.id!==id;});if(store.activeId===id)store.activeId=store.trips[0].id;state=activeTrip();save();renderTripSwitch();renderAll();syncHash();hideMenus();toast("Voyage supprimé");}

  function defaultColor(name){var h=0;for(var i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;return palette[h%palette.length];}
  function color(name){return (state.colors&&state.colors[name])?state.colors[name]:defaultColor(name);}
  function avatar(name){return '<span class="av" data-colperson="'+esc(name)+'" title="Changer la couleur" style="background:'+color(name)+'">'+(name?name[0].toUpperCase():"?")+'</span>';}
  function nights(p){var d=Math.round((Date.parse(p.end)-Date.parse(p.start))/86400000);return d>0?d:0;}
  function days(p){var n=nights(p);if(n<=0)return 0;var base=n+1;for(var i=0;i<state.periods.length;i++){var q=state.periods[i];if(q!==p&&q.end===p.start){base-=1;break;}}return base;}
  var nf=new Intl.NumberFormat("fr-FR",{maximumFractionDigits:2});
  function fmt(n){return nf.format(Math.round(n*100)/100)+" €";}
  function fmtResp(n){return '<span class="amt-full">'+nf.format(Math.round(n*100)/100)+' €</span><span class="amt-round">'+nf.format(Math.round(n))+' €</span>';}
  function frDate(s,o){var d=new Date(s+"T00:00:00");return isNaN(d)?s:d.toLocaleDateString("fr-FR",o);}
  function durLabel(s,e){var n=Math.round((Date.parse(e)-Date.parse(s))/86400000);n=n>0?n:0;var d=n>0?n+1:0;return n+" nuit"+(n>1?"s":"")+" · "+d+" jour"+(d>1?"s":"");}
  function period(id){for(var i=0;i<state.periods.length;i++)if(state.periods[i].id===id)return state.periods[i];return null;}
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
  function basisLabel(b){return b==="days"?"jours":"nuits";}
  function expPeriods(e){if(e.scope==="all")return state.periods.slice();if(e.scope==="sejour"){var ids=e.periods||[];return state.periods.filter(function(p){return ids.indexOf(p.id)>=0;});}var p=period(e.scope);return p?[p]:[];}
  function scopeLabel(e){
    if(e.scope==="custom"){var c=(e.people||[]).filter(function(x){return state.people.indexOf(x)>=0;}).length;return c+" personne"+(c>1?"s":"");}
    var sel=expPeriods(e);if(!sel.length)return"—";
    var base=(sel.length===state.periods.length)?"tout le séjour":sel.map(function(p){return esc(p.name);}).join(", ");
    return base+(sel.length>=2?" · "+basisLabel(e.basis):"");
  }
  function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show");},1800);}

  function matrix(){
    var rows=[],tot={};
    state.people.forEach(function(n){tot[n]=0;});
    state.expenses.forEach(function(e){
      var sh={};state.people.forEach(function(n){sh[n]=0;});
      if(e.scope==="custom"){
        var mc=(e.people||[]).filter(function(x){return state.people.indexOf(x)>=0;});
        if(mc.length){var perc=e.amount/mc.length;mc.forEach(function(n){sh[n]+=perc;});}
      }else if(e.scope==="individual"){
        if(sh[e.person]!==undefined)sh[e.person]+=e.amount;
      }else{
        var sel=expPeriods(e),fn=(e.basis==="days")?days:nights,tw=0;
        sel.forEach(function(p){tw+=fn(p);});
        if(tw>0)sel.forEach(function(p){
          var m=p.members.filter(function(x){return state.people.indexOf(x)>=0;});
          if(!m.length)return;var per=e.amount*fn(p)/tw/m.length;
          m.forEach(function(n){sh[n]+=per;});
        });
      }
      state.people.forEach(function(n){tot[n]+=sh[n];});
      rows.push({e:e,sh:sh});
    });
    return{rows:rows,tot:tot};
  }

  function renderHeader(){
    document.getElementById("trip-name").value=state.tripName;
    var m=matrix(),grand=0;state.people.forEach(function(n){grand+=m.tot[n];});
    document.getElementById("st-total").textContent=fmt(grand);

  function removePerson(n){

    state.people=state.people.filter(function(x){return x!==n;});
    state.periods.forEach(function(p){p.members=p.members.filter(function(x){return x!==n;});});
    state.expenses.forEach(function(e){if(e.people)e.people=e.people.filter(function(x){return x!==n;});});
    state.expenses=state.expenses.filter(function(e){return !(e.scope==="individual"&&e.person===n);});

  /* Glisser-déposer souris + tactile (iOS) via Pointer Events */
  function enableDrag(container,itemSel,handleSel,getId,onDrop,mBefore,mAfter){
    if(!container)return;
    var src=null,srcId=null,started=false,sy=0;
    function clear(){var r=container.querySelectorAll("."+mBefore+",."+mAfter);for(var i=0;i<r.length;i++)r[i].classList.remove(mBefore,mAfter);}
    container.addEventListener("pointerdown",function(e){
      if(e.pointerType==="mouse"&&e.button!==0)return;
      if(!e.target.closest(handleSel))return;
      var it=e.target.closest(itemSel);if(!it)return;
      src=it;srcId=getId(it);started=false;sy=e.clientY;
      try{e.target.setPointerCapture(e.pointerId);}catch(_){}
      e.preventDefault();
    });
    container.addEventListener("pointermove",function(e){
      if(!src)return;
      if(!started){if(Math.abs(e.clientY-sy)<6)return;started=true;src.classList.add("dragging");}
      e.preventDefault();
      var el=document.elementFromPoint(e.clientX,e.clientY);
      var tg=el&&el.closest?el.closest(itemSel):null;
      clear();
      if(tg&&tg!==src){var r=tg.getBoundingClientRect();tg.classList.add((e.clientY-r.top)>r.height/2?mAfter:mBefore);}
    });
    function end(){
      if(!src)return;
      if(started){
        var m=container.querySelector("."+mBefore+",."+mAfter),tg=null,after=false;
        if(m){tg=m;after=m.classList.contains(mAfter);}
        clear();src.classList.remove("dragging");
        if(tg&&tg!==src)onDrop(srcId,getId(tg),after);
      }
      src=null;srcId=null;started=false;
    }
    container.addEventListener("pointerup",end);
    container.addEventListener("pointercancel",end);
  }

  function doImport(file){
    if(!file)return;var r=new FileReader();
    r.onload=function(){
      try{
        var s=JSON.parse(r.result);
        if(!((s&&s.trips&&s.trips.length)||(s&&s.people))){alert("Fichier invalide.");return;}
        if(!confirm("Importer cette sauvegarde ? Cela remplacera tous tes voyages actuels.")){document.getElementById("file-input").value="";return;}
        if(s.trips&&s.trips.length){
          s.trips.forEach(function(t){if(!t.id)t.id=uid();if(!t.colors)t.colors={};});
          if(!s.activeId||!s.trips.some(function(t){return t.id===s.activeId;}))s.activeId=s.trips[0].id;
          store=s;
        }else{
          if(!s.id)s.id=uid();if(!s.seqP)s.seqP=(s.periods?s.periods.length:0)+1;if(!s.seqE)s.seqE=(s.expenses?s.expenses.length:0)+1;if(!s.colors)s.colors={};
          store={trips:[s],activeId:s.id};
        }
        migrate(store);
        state=activeTrip();save();renderTripSwitch();renderAll();toast("Sauvegarde importée");
      }catch(err){alert("Lecture impossible.");}
    };
    r.readAsText(file);document.getElementById("file-input").value="";
  }

    var c=ensureConges(),comptes=c.balances.filter(function(b){return !b.archived&&!typeImpute(b.type);});
    var sans=c.types.filter(function(t){return !t.impute&&!c.balances.some(function(b){return !b.archived&&b.type===t.c;});});
    var body='<div class="cg-choose">'+comptes.map(function(b){var t=cgType(b.type);return '<button type="button" class="cg-choose-b" data-compte="'+b.id+'"><span class="dot" style="background:'+(t?t.col:"#cbd5e1")+'"></span>'+esc(cgCatLabel(b))+'</button>';}).join("")
      +sans.map(function(t){return '<button type="button" class="cg-choose-b" data-compte="t:'+esc(t.c)+'"><span class="dot" style="background:'+esc(t.col||"#cbd5e1")+'"></span>'+esc(t.c)+'</button>';}).join("")
      +'<button type="button" class="cg-choose-b cg-choose-none" data-compte="__none"><span class="cg-nc-ico">×</span>Sans compte (prévisionnel libre)</button></div>';
    modalCtx={type:"prevChoose"};
    openModal("Imputer « "+code+" » sur…",body,false);
    var ft=document.querySelector(".modal-foot");if(ft)ft.style.display="none";
    var mb=document.getElementById("modal-body");
    if(mb)Array.prototype.forEach.call(mb.querySelectorAll("[data-compte]"),function(btn){btn.addEventListener("click",function(){var id=btn.dataset.compte;closeModal();cb(id);});});
  }
  function openCongesSettings(){if(congesReadOnly)return;modalCtx={type:"congesSet"};cgSetPop=null;cgArchOpen=false;openModal("Réglages",'<div id="cg-settings"></div>',false);var ft=document.querySelector(".modal-foot");if(ft)ft.style.display="none";renderCongesSettings();cgBindSettings(document.getElementById("cg-settings"));}
  (function(){
    var grid=document.getElementById("cg-grid"),pal=document.getElementById("cg-pal"),per=document.getElementById("cg-per"),sol=document.getElementById("cg-sol"),modes=document.getElementById("cg-modes");
    if(pal)pal.addEventListener("click",function(e){if(cgViewOnly())return;var b=e.target.closest(".cg-pb");if(!b)return;congesActive=b.dataset.cgT;cgVacTapAnchor=null;renderConges();});
    if(modes)modes.addEventListener("click",function(e){var vt=e.target.closest("[data-cg-vactoggle]");if(vt){congesVacView=!congesVacView;cgVacTapAnchor=null;cgHideVacUI();renderConges();return;}var b=e.target.closest("[data-cg-mode]");if(b&&!congesReadOnly){congesEditMode=(b.dataset.cgMode==="edit");cgVacTapAnchor=null;cgHideVacUI();renderConges();}});
    if(grid){
      grid.addEventListener("click",function(e){if(!cgViewOnly())return;var td=e.target.closest(".cg-cell");if(td&&!td.classList.contains("off")){cgVacHover(td);if(cgTipHideTimer){clearTimeout(cgTipHideTimer);cgTipHideTimer=null;}}});
      grid.addEventListener("mousedown",function(e){if(cgViewOnly())return;var td=e.target.closest(".cg-cell");if(!td||td.classList.contains("off"))return;e.preventDefault();congesDrag=true;congesAnchor={m:+td.dataset.cgM,d:+td.dataset.cgD};congesLast={m:congesAnchor.m,d:congesAnchor.d};cgClearHover();cgPreview([congesAnchor]);});
      grid.addEventListener("mouseover",function(e){var td=e.target.closest(".cg-cell");if(!td||td.classList.contains("off"))return;if(congesDrag){congesLast={m:+td.dataset.cgM,d:+td.dataset.cgD};cgPreview(cgRange(congesAnchor,congesLast));}else{if(cgTouchScreen()&&!cgViewOnly())return;cgHover(td);cgVacHover(td);}});
      grid.addEventListener("mouseleave",function(){cgClearCols();cgScheduleTipHide();});
    }
    document.addEventListener("mouseup",function(){if(!congesDrag)return;congesDrag=false;cgClearPreview();
      var cells=congesAnchor?cgRange(congesAnchor,congesLast||congesAnchor):[];var single=(cells.length===1);congesAnchor=null;congesLast=null;if(!cells.length)return;
      var act=congesActive;
      if(act==="__vac"){var a=cells[0],b=cells[cells.length-1];
        /* Sur tactile : tap dans/adjacent à une plage = ajustement direct ;
           tap isolé = sélection en deux taps (début puis fin), le glisser servant au défilement */
        if(cgTouchScreen()&&single){
          if(!cgVacTapAnchor||cgVacTapAnchor.y!==congesYear){
            if(cgVacAdjustTap({y:congesYear,m:a.m,d:a.d})){saveConges();renderConges();return;}
            cgVacTapAnchor={y:congesYear,m:a.m,d:a.d};cgPreview([a]);toast("Début sélectionné — tape le jour de fin");return;
          }
          var vr=cgRange(cgVacTapAnchor,a);cgVacTapAnchor=null;cgClearPreview();a=vr[0];b=vr[vr.length-1];
        }
        var nv={id:uid(),s:{y:congesYear,m:a.m,d:a.d},e:{y:congesYear,m:b.m,d:b.d},label:""};ensureConges().vacs.push(nv);saveConges();renderConges();var fcell=document.querySelector('#cg-grid .cg-cell[data-cg-m="'+a.m+'"][data-cg-d="'+a.d+'"]');if(fcell)cgVacHover(fcell);return;}
      if(act==="__e"){congesPaintVal=null;cgCommitRange(cells);saveConges();renderConges();return;}
      if(single){cgCycleCell(cells[0],act);return;}
      if(act.indexOf("i:")===0&&act.indexOf(":",2)<0){var code=act.slice(2);cgAskCompte(code,function(compteId){if(!compteId)return;congesPaintVal=(compteId==="__none")?("t:"+code):(act+":"+compteId);cgCommitRange(cells);saveConges();renderConges();});return;}
      congesPaintVal=act;cgCommitRange(cells);saveConges();renderConges();
    });
    var tip=document.getElementById("cg-tip");
    if(tip){
      tip.addEventListener("mouseenter",function(){if(cgTipHideTimer){clearTimeout(cgTipHideTimer);cgTipHideTimer=null;}});
      tip.addEventListener("mouseleave",function(){cgScheduleTipHide();});
      tip.addEventListener("input",function(e){var inp=e.target.closest(".cg-tip-name");if(!inp||!cgTipVac)return;var v=(ensureConges().vacs||[]).filter(function(x){return x.id===cgTipVac;})[0];if(v){v.label=inp.value;saveConges();cgRenderVacOverlay();}});
      tip.addEventListener("click",function(e){var dl=e.target.closest(".cg-tip-del");if(!dl||!cgTipVac)return;if(!confirm("Supprimer cette vacance ?"))return;var c=ensureConges();c.vacs=(c.vacs||[]).filter(function(x){return x.id!==cgTipVac;});saveConges();tip.hidden=true;cgTipVac=null;renderConges();});
    }
    /* Tooltip des soldes (style Patrimoine) */
    var solHost=document.getElementById("cg-sol");
    if(solHost){
      solHost.addEventListener("click",function(e){var b=e.target.closest("[data-cg-solview]");if(!b)return;cgSolView=b.dataset.cgSolview;try{localStorage.setItem("cg-sol-view",cgSolView);}catch(err){}cgSolTipHide();renderCongesSol();});
      solHost.addEventListener("mouseover",function(e){var r=e.target.closest(".cg-solr");if(r&&r.dataset.cgSolid)cgSolTipShow(r,e);});
      solHost.addEventListener("mousemove",function(e){var t=document.getElementById("cg-soltip");if(t&&!t.hidden)cgSolTipMove(e.clientX,e.clientY);});
      solHost.addEventListener("mouseout",function(e){var r=e.target.closest(".cg-solr");if(r&&!(e.relatedTarget&&e.relatedTarget.closest&&e.relatedTarget.closest(".cg-solr")))cgSolTipHide();});
      document.addEventListener("click",function(e){if(!e.target.closest(".cg-solr"))cgSolTipHide();});
    }
    window.addEventListener("resize",function(){if(curModule==="conges")cgRenderVacOverlay();});
    var yprev=document.getElementById("cg-yprev");if(yprev)yprev.addEventListener("click",function(){congesYear--;renderConges();});
    var ynext=document.getElementById("cg-ynext");if(ynext)ynext.addEventListener("click",function(){congesYear++;renderConges();});
    var ybtn=document.getElementById("cg-year-btn");if(ybtn)ybtn.addEventListener("click",function(e){e.stopPropagation();var p=document.getElementById("cg-year-pop");if(p)p.hidden=!p.hidden;});
    var yp2=document.getElementById("cg-year-pop");if(yp2)yp2.addEventListener("click",function(e){var cc=e.target.closest("[data-cg-year]");if(!cc)return;congesYear=+cc.dataset.cgYear;yp2.hidden=true;renderConges();});
  })();
  function showLogin(on){var l=document.getElementById("login");if(l)l.hidden=!on;var c=document.querySelector(".container");if(c)c.style.display=on?"none":"";}
  function hideBoot(){var b=document.getElementById("boot");if(b)b.hidden=true;}
  function isEditing(){var a=document.activeElement;if(a&&(a.tagName==="INPUT"||a.tagName==="TEXTAREA"||a.tagName==="SELECT"||a.isContentEditable))return true;var md=document.getElementById("modal");if(md&&!md.hidden)return true;return false;}
  function safeRender(){try{renderTripSwitch();renderAll();renderConges();}catch(err){if(typeof console!=="undefined"&&console.error)console.error("Erreur de rendu Mosaïque :",err);}}
  function applyRemote(json){if(json==null||json===lastJson)return;var s;try{s=JSON.parse(json);}catch(e){return;}if(!s||!s.trips)return;lastJson=json;store=migrate(s);if(!store.activeId||!store.trips.some(function(t){return t.id===store.activeId;}))store.activeId=(store.trips[0]||{}).id;try{localStorage.setItem(STORE_KEY,json);}catch(e){}state=activeTrip();safeRender();}
  function onRemote(json){if(json==null)return;if(isEditing()){pendingRemote=json;return;}applyRemote(json);}
  document.addEventListener("focusout",function(){setTimeout(function(){if(pendingRemote!=null&&!isEditing()){var j=pendingRemote;pendingRemote=null;applyRemote(j);}if(congesPendingRemote!=null&&!isEditing()&&!congesDrag){var cj=congesPendingRemote;congesPendingRemote=null;applyCongesRemote(cj);}},150);});
  function loadCloud(){
    var ref=db.collection("budgets").doc(SHARED);
    setTimeout(hideBoot,5000);
    ref.get().then(function(snap){
      var s=null;if(snap.exists){var d=snap.data();if(d&&d.json){try{s=JSON.parse(d.json);}catch(e){}}}
      if(!s||!s.trips||!s.trips.length)s=loadStore();
      store=migrate(s);if(!store.activeId||!store.trips.some(function(t){return t.id===store.activeId;}))store.activeId=store.trips[0].id;
      var congesLegacy=store.conges;if(congesLegacy)delete store.conges;
      lastJson=JSON.stringify(store);
      state=activeTrip();safeRender();hideBoot();bootRoute();
      try{ref.set({json:lastJson});}catch(e){}
      if(unsub)unsub();
      unsub=ref.onSnapshot(function(sn){if(sn.metadata.hasPendingWrites)return;var dd=sn.data();if(dd&&dd.json)onRemote(dd.json);});
      loadConges(congesLegacy);
    }).catch(function(){store=loadStore();var lg=store.conges;if(lg)delete store.conges;state=activeTrip();safeRender();hideBoot();bootRoute();loadConges(lg);});
  }
  /* ===== 5. Démarrage : auth, chargement & synchronisation ===== */
  if(CLOUD){
    var _ab=document.querySelectorAll(".acct-btn");for(var _i=0;_i<_ab.length;_i++)_ab[_i].hidden=false;
    var lf=document.getElementById("login-form");
    if(lf)lf.addEventListener("submit",function(e){e.preventDefault();var em=(document.getElementById("login-email").value||"").trim(),pw=document.getElementById("login-pass").value||"";document.getElementById("login-err").textContent="";auth.signInWithEmailAndPassword(em,pw).catch(function(err){document.getElementById("login-err").textContent="Connexion impossible. Vérifie l'e-mail et le mot de passe.";});});
    auth.onAuthStateChanged(function(u){fbUser=u;if(u){showLogin(false);var _ab2=document.querySelectorAll(".acct-btn");for(var _j=0;_j<_ab2.length;_j++)_ab2[_j].textContent=acctInitial();loadCloud();loadAccess(u);}else{if(unsub){unsub();unsub=null;}if(congesUnsub){congesUnsub();congesUnsub=null;}congesData=null;moduleAccess={voyages:true,conges:true};applyModuleAccess();showLogin(true);hideBoot();}});
  }else{
    store=loadStore();var lg=store.conges;if(lg)delete store.conges;congesData=loadCongesLocal()||lg||{};state=activeTrip();renderTripSwitch();renderAll();renderConges();save();hideBoot();bootRoute();
  }
})();
